<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Viola</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<div class="top">
    <img src="/viola-logo.jpg" class="logo" alt="Viola Logo">
    <h1>VIOLA</h1>
</div>

<div class="bottom">
    <input id="url" placeholder="Enter URL">
    <button onclick="go()">Go</button>
</div>

<script>
function go() {
    let url = document.getElementById("url").value;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    window.location = "/browser?url=" + btoa(url);
}
</script>

</body>
</html>
